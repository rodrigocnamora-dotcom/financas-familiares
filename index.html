<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finanças">
<meta name="theme-color" content="#FFFFFF">
<title>Finanças Familiares</title>
<style>
  :root {
    --bg-primary: #FFFFFF; --bg-secondary: #F4F3EF; --bg-tertiary: #ECEAE3;
    --text-primary: #1A1A18; --text-secondary: #6B6A65; --text-tertiary: #9C9B95;
    --border: rgba(26,26,24,0.10); --border-strong: rgba(26,26,24,0.18);
    --accent: #1A1A18;
    --success: #0F6E56; --success-bg: #E1F5EE;
    --warning: #854F0B; --warning-bg: #FAEEDA;
    --danger: #993C1D; --danger-bg: #FAECE7;
    --info: #185FA5; --info-bg: #E6F1FB;
    --radius-md: 10px; --radius-lg: 16px;
    --c-alimentacao: #378ADD; --c-habitacao: #1D9E75; --c-transportes: #BA7517;
    --c-saude: #993556; --c-poupancas: #534AB7; --c-lazer: #D85A30; --c-outros: #888780;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1C1C1A; --bg-secondary: #262624; --bg-tertiary: #2F2F2C;
      --text-primary: #F2F1EC; --text-secondary: #ACABA4; --text-tertiary: #7C7B75;
      --border: rgba(255,255,255,0.10); --border-strong: rgba(255,255,255,0.18);
      --accent: #F2F1EC;
      --success: #5DCAA5; --success-bg: #0B3A2E;
      --warning: #EF9F27; --warning-bg: #422D08;
      --danger: #F0997B; --danger-bg: #4A2415;
      --info: #85B7EB; --info-bg: #0E3A5C;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg-tertiary); }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text-primary); padding-bottom: env(safe-area-inset-bottom); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-tertiary); display: flex; flex-direction: column; }
  .topbar { padding: calc(env(safe-area-inset-top) + 14px) 18px 12px; background: var(--bg-tertiary); position: sticky; top: 0; z-index: 10; }
  .topbar-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 20px; font-weight: 600; }
  .app-sub { font-size: 13px; color: var(--text-secondary); margin-top: 1px; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; }
  .sync-dot.offline { background: var(--text-tertiary); }
  .icon-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--bg-secondary); border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-secondary); cursor: pointer; }
  .content { flex: 1; padding: 0 18px 100px; overflow-x: hidden; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 22px 0 10px; }
  .section-title:first-child { margin-top: 4px; }
  .card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 12px; }
  .card-flat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; }
  .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-sub { font-size: 11px; margin-top: 4px; font-weight: 500; }
  .metric-sub.ok { color: var(--success); }
  .metric-sub.over { color: var(--danger); }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .month-nav button { background: var(--bg-secondary); border: none; border-radius: var(--radius-md); width: 34px; height: 30px; cursor: pointer; color: var(--text-secondary); font-size: 14px; }
  .month-label { font-size: 15px; font-weight: 600; }
  .budget-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 13px; }
  .budget-cat { flex: 1; font-weight: 500; }
  .budget-bar-bg { flex: 1.6; height: 7px; background: var(--bg-tertiary); border-radius: 99px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 99px; transition: width .3s; }
  .budget-pct { min-width: 38px; text-align: right; color: var(--text-secondary); font-size: 12px; }
  .budget-detail { font-size: 11px; color: var(--text-tertiary); margin: 0 0 12px; display: flex; justify-content: space-between; }
  .budget-detail:last-of-type { margin-bottom: 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .tx-list { list-style: none; }
  .tx-item { display: flex; align-items: center; gap: 11px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .tx-item:last-child { border-bottom: none; }
  .tx-icon { width: 36px; height: 36px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .tx-amount { font-size: 14px; font-weight: 600; color: var(--danger); flex-shrink: 0; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; margin-left: 6px; }
  .badge-auto { background: var(--success-bg); color: var(--success); }
  .badge-pending { background: var(--warning-bg); color: var(--warning); }
  .tab-bar { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 3px; margin-bottom: 18px; }
  .tab { flex: 1; text-align: center; padding: 8px 4px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; color: var(--text-secondary); background: transparent; }
  .tab.active { background: var(--bg-primary); color: var(--text-primary); }
  .btn-primary { width: 100%; padding: 14px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; background: var(--accent); color: var(--bg-tertiary); border: none; }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-outline { padding: 10px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; cursor: pointer; background: var(--bg-secondary); color: var(--text-primary); border: none; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: var(--bg-primary); border-top: 1px solid var(--border); display: flex; padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); z-index: 20; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; background: none; border: none; color: var(--text-tertiary); font-size: 11px; font-weight: 600; cursor: pointer; }
  .nav-btn.active { color: var(--text-primary); }
  .nav-btn .nav-icon { font-size: 20px; }
  .fab { position: fixed; bottom: 78px; right: calc(50% - 240px + 18px); width: 54px; height: 54px; border-radius: 50%; background: var(--accent); color: var(--bg-tertiary); border: none; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.18); z-index: 19; }
  @media (max-width: 480px) { .fab { right: 18px; } }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-primary); border-radius: 20px 20px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; display: block; }
  .form-input, .form-select { width: 100%; padding: 11px 13px; border: 1px solid var(--border-strong); border-radius: var(--radius-md); font-size: 15px; background: var(--bg-primary); color: var(--text-primary); -webkit-appearance: none; }
  .btn-row { display: flex; gap: 8px; margin-top: 18px; }
  .btn-cancel { flex: 1; padding: 12px; border-radius: var(--radius-md); border: none; background: var(--bg-secondary); color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-save { flex: 2; padding: 12px; border-radius: var(--radius-md); border: none; background: var(--accent); color: var(--bg-tertiary); font-size: 14px; font-weight: 600; cursor: pointer; }
  .bank-pill { display: inline-flex; align-items: center; gap: 5px; padding: 9px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; border: 1px solid var(--border-strong); margin: 0 8px 8px 0; cursor: pointer; background: var(--bg-primary); color: var(--text-secondary); }
  .bank-pill.selected { background: var(--info-bg); color: var(--info); border-color: var(--info); }
  .drop-zone { border: 1.5px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 32px 16px; text-align: center; cursor: pointer; background: var(--bg-primary); }
  .drop-zone:active { background: var(--bg-secondary); }
  .drop-icon { font-size: 30px; color: var(--text-secondary); margin-bottom: 8px; }
  .drop-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .drop-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .cat-select { font-size: 12px; padding: 5px 9px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); background: var(--bg-primary); color: var(--text-primary); margin-top: 4px; }
  .btn-edit-cat { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: var(--radius-md); }
  .toast { position: fixed; bottom: 90px; left: 18px; right: 18px; max-width: 444px; margin: 0 auto; background: var(--text-primary); color: var(--bg-tertiary); padding: 13px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; text-align: center; opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none; z-index: 200; transform: translateY(10px); }
  @media (prefers-color-scheme: dark) { .toast { background: var(--bg-secondary); color: var(--text-primary); } }
  .toast.show { opacity: 1; transform: translateY(0); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
  .empty-state .ti { font-size: 32px; margin-bottom: 10px; display: block; color: var(--text-tertiary); }
  .stat-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
  .auth-screen { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 24px; max-width: 480px; margin: 0 auto; }
  .auth-logo { text-align: center; margin-bottom: 8px; font-size: 32px; }
  .auth-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .auth-sub { text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
  .auth-error { background: var(--danger-bg); color: var(--danger); font-size: 13px; padding: 10px 12px; border-radius: var(--radius-md); margin-bottom: 14px; display: none; }
  .auth-toggle { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 16px; }
  .auth-toggle a { color: var(--text-primary); font-weight: 600; text-decoration: none; }
  .auth-mode-tabs { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 3px; margin-bottom: 22px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  canvas { max-width: 100%; }
</style>
</head>
<body>

<div class="app" id="app"></div>

<input type="file" id="csv-input" accept=".csv,.xls,.xlsx" style="display:none;">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
